appId: com.quotient.app
productName: Quotient
copyright: Copyright © 2025 Quotient
directories:
  buildResources: build
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintcache,eslint.config.mjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
asarUnpack:
  - 'resources/**'
mac:
  category: public.app-category.finance
  target:
    - target: dmg
      arch: [x64, arm64]
  notarize: false
  entitlementsInherit: build/entitlements.mac.plist
  extendInfo:
    - NSDocumentsFolderUsageDescription: Quotient reads CSV files from your Documents folder.
    - NSDownloadsFolderUsageDescription: Quotient reads CSV exports from your Downloads folder.
dmg:
  artifactName: ${productName}-${version}-${arch}.${ext}
  title: ${productName} ${version}
  window:
    width: 540
    height: 380
win:
  executableName: quotient
  target:
    - target: nsis
      arch: [x64]
nsis:
  artifactName: ${productName}-${version}-setup.${ext}
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
linux:
  target:
    - AppImage
  category: Office
appImage:
  artifactName: ${productName}-${version}.${ext}
npmRebuild: false
publish: null
